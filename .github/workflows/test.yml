name: test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      pytest_addopts:
        description:
          Extra options for pytest; use -vv for full details; see
          https://docs.pytest.org/en/latest/example/simple.html#how-to-change-command-line-options-defaults
        required: false

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  LANG: "en_US.utf-8"
  LC_ALL: "en_US.utf-8"
  PIP_CACHE_DIR: ${{ github.workspace }}/.cache.~/pip
  PIPX_HOME: ${{ github.workspace }}/.cache.~/pipx
  POETRY_CACHE_DIR: ${{ github.workspace }}/.cache.~/pypoetry
  POETRY_VIRTUALENVS_IN_PROJECT: "true"
  PRE_COMMIT_HOME: ${{ github.workspace }}/.cache.~/pre-commit
  PYTEST_ADDOPTS: ${{ github.event.inputs.pytest_addopts }}
  PYTHONIOENCODING: "UTF-8"

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: &checkout actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: &setup-python actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - uses: snok/install-poetry@a783c322200f0519c7926aa6faa857c4e23e9263 # v1.4.2
        with:
          version: 2.4.1
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1

  test:
    runs-on: ubuntu-latest
    needs: pre-commit
    strategy:
      matrix:
        odoo-version: ["19.0"]
        python-version: ["3.12"]
        traefik-version: [3]
        include:
          - odoo-version: "18.0"
            python-version: "3.10"
            traefik-version: 2
          - odoo-version: "18.0"
            python-version: "3.11"
            traefik-version: 3
          - odoo-version: "17.0"
            python-version: "3.10"
            traefik-version: 2
          - odoo-version: "17.0"
            python-version: "3.10"
            traefik-version: 3
          - odoo-version: "16.0"
            python-version: "3.10"
            traefik-version: 2
          - odoo-version: "16.0"
            python-version: "3.10"
            traefik-version: 3
          - odoo-version: "15.0"
            python-version: "3.9"
            traefik-version: 2
          - odoo-version: "15.0"
            python-version: "3.9"
            traefik-version: 3
          - odoo-version: "14.0"
            python-version: "3.9"
            traefik-version: 3
          - odoo-version: "13.0"
            python-version: "3.9"
            traefik-version: 3

    steps:
      # Shared steps
      - uses: *checkout
        with:
          fetch-depth: 0 # Fetch all history for all tags and branches
      - name: Install python
        uses: *setup-python
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up Docker Compose
        uses: docker/setup-compose-action@16feee727cbdc83b6a014e6cc26fec4a79bcf30c # v2.2.0
        with:
          version: v2.40.3
      - name: Generate cache key CACHE
        run:
          echo "CACHE=${{ secrets.CACHE_DATE }} ${{ runner.os }} $(python -VV |
          sha256sum | cut -d' ' -f1) ${{ hashFiles('pyproject.toml') }} ${{
          hashFiles('poetry.lock') }} ${{ hashFiles('.pre-commit-config.yaml') }}" >>
          $GITHUB_ENV
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .cache.~
            .venv
            ~/.local/bin
          key: venv ${{ env.CACHE }}
      - run: pip install poetry
      - name: Patch $PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH
      - run: poetry install --no-root
      # Precreate shared networks to avoid race conditions
      - run: docker network create inverseproxy_shared
      - run: docker network create globalwhitelist_shared
      # Let tests issue git commits
      - run: git config --global user.name CI
      - run: git config --global user.email CI@GITHUB
      # Run all tests, which includes linters
      # Non concurrent first (in parallel)
      - run: poetry run invoke test
        env:
          SELECTED_ODOO_VERSIONS: ${{ matrix.odoo-version }}
          TRAEFIK_VERSION: ${{ matrix.traefik-version }}
      # Concurrent tests (isolated)
      - run: poetry run invoke test --sequential
        env:
          SELECTED_ODOO_VERSIONS: ${{ matrix.odoo-version }}
          TRAEFIK_VERSION: ${{ matrix.traefik-version }}
